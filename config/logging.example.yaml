version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    level: WARNING
    formatter: standard
    stream: ext://sys.stderr
  file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: logs/juslag.log
    encoding: utf-8
root:
  level: INFO
  handlers:
    - console
    - file
